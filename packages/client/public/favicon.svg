<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="40" y1="28" x2="216" y2="228" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E9D5FF"/>
      <stop offset="0.45" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="shine" x1="64" y1="40" x2="160" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="0.4" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0B1020" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#C4B5FD" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Card -->
  <g filter="url(#shadow)">
    <rect x="46" y="28" width="164" height="200" rx="26" fill="url(#bg)"/>
    <rect x="46" y="28" width="164" height="200" rx="26" stroke="#ECE9FE" stroke-opacity="0.55" stroke-width="3"/>
    <path d="M62 56 C92 32, 132 32, 198 64 L198 92 C144 70, 106 72, 62 92 Z" fill="url(#shine)"/>
  </g>

  <!-- Inner pattern -->
  <g opacity="0.22">
    <path d="M76 152 C112 132, 148 132, 180 152" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
    <path d="M76 176 C112 156, 148 156, 180 176" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- 3 mark -->
  <g filter="url(#glow)">
    <path d="M112 108
             C112 92, 124 82, 140 82
             C156 82, 168 92, 168 108
             C168 118, 162 126, 152 130
             C164 134, 172 144, 172 158
             C172 176, 158 188, 138 188
             C120 188, 106 178, 104 160"
          stroke="#0B1020" stroke-opacity="0.22" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M112 108
             C112 92, 124 82, 140 82
             C156 82, 168 92, 168 108
             C168 118, 162 126, 152 130
             C164 134, 172 144, 172 158
             C172 176, 158 188, 138 188
             C120 188, 106 178, 104 160"
          stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>

