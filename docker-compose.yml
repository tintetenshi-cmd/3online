version: '3.8'

services:
  3online:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CLIENT_URL=http://localhost:3001
    volumes:
      - ./packages/client/dist:/app/client
    restart: unless-stopped
    
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./packages/client/dist:/usr/share/nginx/html
    depends_on:
      - 3online
    restart: unless-stopped